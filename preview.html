<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>가맹거래사 1차 시험대비 — 모바일 미리보기</title>
<style>
  :root {
    --bg: #ECEAE4;
    --bg-alt: #DFDCD3;
    --ink: #1E1C19;
    --ink-soft: #6B6558;
    --accent: #FF6B1A;
    --frame: #0E0D0C;
    --frame-edge: #2A2825;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17161A;
      --bg-alt: #1F1E23;
      --ink: #F2F0EC;
      --ink-soft: #9A968E;
      --accent: #FF8A42;
      --frame: #050505;
      --frame-edge: #2A2825;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, sans-serif;
    overflow-x: hidden;
  }
  .stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 48px 20px 64px;
  }
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .eyebrow .dot {
    width: 7px;
    height: 7px;
    border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 107, 26, 0.2);
  }
  h1 {
    margin: 0;
    font-size: clamp(20px, 3vw, 26px);
    font-weight: 700;
    letter-spacing: -0.01em;
    text-align: center;
  }
  .sub {
    margin: -14px 0 0;
    font-size: 14px;
    color: var(--ink-soft);
    text-align: center;
    max-width: 40ch;
  }
  .device {
    position: relative;
    width: 375px;
    max-width: 88vw;
    aspect-ratio: 375 / 812;
    border-radius: 52px;
    background: linear-gradient(180deg, var(--frame-edge), var(--frame));
    padding: 14px;
    box-shadow:
      0 2px 0 rgba(255,255,255,0.04) inset,
      0 40px 80px -20px rgba(0,0,0,0.55),
      0 10px 30px -10px rgba(0,0,0,0.4);
  }
  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 38px;
    overflow: hidden;
    background: #fff;
  }
  .notch {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 26px;
    background: var(--frame);
    border-radius: 999px;
    z-index: 3;
  }
  .side-btn { position: absolute; background: var(--frame-edge); }
  .side-btn.power { right: -2px; top: 130px; width: 3px; height: 70px; border-radius: 0 3px 3px 0; }
  .side-btn.vol1 { left: -2px; top: 110px; width: 3px; height: 36px; border-radius: 3px 0 0 3px; }
  .side-btn.vol2 { left: -2px; top: 156px; width: 3px; height: 56px; border-radius: 3px 0 0 3px; }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
  .meta { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--ink-soft); }
  .meta a { color: var(--ink); text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255,107,26,0.5); }
  .meta a:hover { border-bottom-color: var(--accent); }
  .meta button {
    all: unset;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--bg-alt);
  }
  .meta button:hover { background: rgba(255,107,26,0.14); }
  .meta svg { width: 13px; height: 13px; }
</style>
</head>
<body>
<div class="stage">
  <div class="eyebrow"><span class="dot"></span>Live preview</div>
  <h1>가맹거래사 1차 시험대비</h1>
  <p class="sub">실제 배포된 사이트를 모바일 프레임 안에서 그대로 확인해보세요.</p>

  <div class="device">
    <div class="notch"></div>
    <div class="side-btn power"></div>
    <div class="side-btn vol1"></div>
    <div class="side-btn vol2"></div>
    <div class="screen">
      <iframe id="frame" src="./index.html" title="가맹거래사 1차 시험대비 미리보기"></iframe>
    </div>
  </div>

  <div class="meta">
    <a href="./index.html" target="_blank" rel="noopener">새 창에서 열기 ↗</a>
    <button id="reload" type="button" aria-label="새로고침">새로고침</button>
  </div>
</div>
<script>
  document.getElementById('reload').addEventListener('click', function () {
    var frame = document.getElementById('frame');
    frame.src = './index.html?t=' + Date.now();
  });
</script>
</body>
</html>
